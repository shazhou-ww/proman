name: "release"
version: 2
description: "Release proman monorepo with $SUSPEND gates for PR review and npm OTP."
roles:
  preflight:
    description: "Verify repository readiness for release"
    goal: "Check all pre-flight conditions for releasing proman."
    capabilities:
      - git
    procedure: |
      cd into the repo path from the task prompt.

      Check base conditions — abort on first failure with `$status: not_ready`:

      1. On `main` branch (`git branch --show-current`)
      2. Clean working tree (`git status --porcelain` is empty)
      3. Up to date (`git pull --ff-only` succeeds)
      4. CI green on HEAD:
         ```bash
         GITEA_TOKEN=$(cfg get GITEA_TOKEN)
         HEAD_SHA=$(git rev-parse HEAD)
         ```
         Poll `GET /api/v1/repos/<owner/repo>/commits/${HEAD_SHA}/statuses` (plural, with 's')
         up to 10× (30s interval).

         Group results by `context` field. For each context, keep only the entry with the
         latest `created_at` timestamp. Evaluate only these latest-per-context entries:

         - All `success` → accept, proceed.
         - Any `pending`, none newer → keep polling.
         - At least one context's latest is `success`, no `pending` → accept
           (a newer successful run supersedes an older failure under a different context).
         - All latest entries are `failure`/`error` → run local verification fallback:
           ```bash
           pnpm build && pnpm test
           ```
           If local tests pass → accept with warning ("CI status stale/flaky, local verification passed").
           If local tests also fail → abort with `$status: not_ready`.

         Timeout after ~5min if still `pending`.

      Then check changeset and publish state:

      5. Look for pending changesets:
         ```bash
         find .changeset -name '*.md' ! -name 'README.md' -type f
         ```

      6. Read current versions from each package and check npm:
         ```bash
         # Read versions from proman.yaml packages
         for pkg_dir in packages/core packages/cli; do
           PKG_NAME=$(node -e "console.log(require('./${pkg_dir}/package.json').name)")
           LOCAL_VERSION=$(node -e "console.log(require('./${pkg_dir}/package.json').version)")
           NPM_VERSION=$(npm view ${PKG_NAME}@${LOCAL_VERSION} version 2>/dev/null || echo "")
           echo "${PKG_NAME}@${LOCAL_VERSION} npm=${NPM_VERSION:-unpublished}"
         done
         ```

      Decision:
      - Changesets found → output `$status: ready` with changeset list (normal full flow)
      - No changesets, but ANY package's local version NOT on npm → output `$status: already_bumped` with versions (skip bumper, go straight to publish)
      - No changesets, and ALL packages' local versions already on npm → output `$status: not_ready` with reason "no pending changesets and current versions already published"

      Pass through `repo` and `repoPath` from the task prompt in all non-error outputs.
    output: "ready, already_bumped, or not_ready"
    frontmatter:
      oneOf:
        - properties:
            $status: { const: "ready" }
            changesets: { type: string }
            repo: { type: string }
            repoPath: { type: string }
          required: [$status, changesets, repo, repoPath]
        - properties:
            $status: { const: "already_bumped" }
            versions: { type: string }
            repo: { type: string }
            repoPath: { type: string }
          required: [$status, versions, repo, repoPath]
        - properties:
            $status: { const: "not_ready" }
            reason: { type: string }
          required: [$status, reason]

  bumper:
    description: "Bump version via proman bump, suspend for user confirmation, then open and merge PR"
    goal: "Bump version, let user confirm, then create and merge the release PR."
    capabilities:
      - git
      - npm
    procedure: |
      cd into the repo path.

      **First run — bump and suspend for confirmation:**

      1. Read changeset files to preview what will be bumped:
         ```bash
         find .changeset -name '*.md' ! -name 'README.md' -exec cat {} +
         ```

      2. Create release branch:
         ```bash
         git checkout -b release/v${ANTICIPATED_VERSION}
         ```
         (Anticipate the version from changesets — take the highest bump type across all packages.)

      3. Run `proman bump` to consume changesets and update versions:
         ```bash
         pnpm build && node packages/cli/dist/cli.js bump
         ```
         This handles:
         - Reading changesets and determining bump type per package
         - Updating version in each package's package.json
         - Propagating workspace dependency versions
         - Deleting consumed changeset files
         - Generating CHANGELOG entries

         Capture the output to know which packages were bumped and to what versions.

      4. Verify the bump is clean:
         ```bash
         pnpm build && pnpm test
         ```
         If either fails, abort: `git checkout main`, output `$status: failed`.

      5. Emit `$SUSPEND` with the bumped versions and changelog diff for user confirmation.

      **On resume — commit, open PR, merge directly:**

      1. Read the new CLI version (primary version for tagging):
         ```bash
         NEW_VERSION=$(node -e "console.log(require('./packages/cli/package.json').version)")
         ```

      2. Commit and push:
         ```bash
         git add -A
         git commit -m "release: v${NEW_VERSION}"
         git push --no-verify -u origin release/v${NEW_VERSION}
         ```

      3. Open PR via Gitea API:
         ```bash
         GITEA_TOKEN=$(cfg get GITEA_TOKEN)
         curl -s -X POST \
           -H "Authorization: token ${GITEA_TOKEN}" \
           -H "Content-Type: application/json" \
           "https://git.shazhou.work/api/v1/repos/${OWNER_REPO}/pulls" \
           -d '{"title":"release: v'"${NEW_VERSION}"'","head":"release/v'"${NEW_VERSION}"'","base":"main","body":"..."}'
         ```
         Record the PR number.

      4. Merge the PR directly via Gitea API (force_merge for release PRs):
         ```bash
         curl -s -X POST \
           -H "Authorization: token ${GITEA_TOKEN}" \
           -H "Content-Type: application/json" \
           "https://git.shazhou.work/api/v1/repos/${OWNER_REPO}/pulls/<PR_NUMBER>/merge" \
           -d '{"Do":"merge","force_merge":true,"merge_message_field":"release: v'"${NEW_VERSION}"'"}'
         ```
         If merge fails, output `$status: failed` with reason.

      5. Clean up:
         ```bash
         git checkout main && git pull --ff-only
         git branch -d release/v${NEW_VERSION}
         git push origin --delete release/v${NEW_VERSION} 2>/dev/null
         ```

      6. Output `$status: merged` with version, PR number, and pass through `repo` and `repoPath`.

    output: "merged after user confirms version, or $SUSPEND while waiting"
    frontmatter:
      oneOf:
        - properties:
            $status: { const: "merged" }
            version: { type: string }
            prNumber: { type: string }
            repo: { type: string }
            repoPath: { type: string }
          required: [$status, version, repo, repoPath]
        - properties:
            $status: { const: "failed" }
            reason: { type: string }
          required: [$status, reason]

  publisher:
    description: "Publish all packages via proman publish, tag, verify, sync"
    goal: "Publish the bumped version to npm and finalize the release."
    capabilities:
      - git
      - npm
    procedure: |
      cd into the repo path. Should be on main with the bumped version already merged.

      1. Verify on main, clean tree, correct versions in package.json files.

      2. Publish all packages via proman publish:
         ```bash
         pnpm build && node packages/cli/dist/cli.js publish
         ```
         `proman publish` handles the full pipeline:
         - pnpm install → build → test → check
         - Smoke test each tarball (with workspace dep symlinks)
         - `pnpm publish` each package in topo order (resolves workspace:*)
         - Skip already-published versions
         - Git commit, tag all packages, push

         If proman publish succeeds, it has already tagged and pushed.
         If it fails, output `$status: failed`.

      3. If proman publish did not tag (e.g. all packages were already published),
         create tag manually:
         ```bash
         VERSION=$(node -e "console.log(require('./packages/cli/package.json').version)")
         git tag "v${VERSION}" 2>/dev/null || true
         git push origin --tags
         ```

      4. Verify on npm:
         ```bash
         npm view @shazhou/proman-core@${VERSION} version
         npm view @shazhou/proman@${VERSION} version
         ```
         Check that workspace:* was resolved (not literal):
         ```bash
         npm view @shazhou/proman@${VERSION} dependencies --json
         ```
         The `@shazhou/proman-core` dependency should be a semver, not `workspace:*`.
         If verification fails, output `$status: verify_failed`.

      5. Sync to GitHub (if remote exists):
         ```bash
         git remote -v | grep github
         git push github main --tags
         ```
         Note result but do NOT fail the release if GitHub sync fails.

      6. Output `$status: released` with packages, version, tag, githubSync.

    output: "released, failed, or verify_failed"
    frontmatter:
      oneOf:
        - properties:
            $status: { const: "released" }
            packages: { type: string }
            version: { type: string }
            tag: { type: string }
            githubSync: { type: string }
          required: [$status, packages, version, tag]
        - properties:
            $status: { const: "failed" }
            reason: { type: string }
          required: [$status, reason]
        - properties:
            $status: { const: "verify_failed" }
            reason: { type: string }
          required: [$status, reason]

graph:
  $START:
    new: { role: "preflight", prompt: "Pre-flight check for releasing {{ repo }} from {{ repoPath }}." }
    resume: { role: "preflight", prompt: "Re-check release readiness for {{ repo }} at {{ repoPath }}." }
  preflight:
    ready: { role: "bumper", prompt: "Bump version for {{ repo }} at {{ repoPath }}. Pending changesets:\n{{ changesets }}" }
    already_bumped: { role: "publisher", prompt: "Publish {{ repo }} from {{ repoPath }}. Versions already bumped ({{ versions }}), skipping to publish." }
    not_ready: { role: "$END", prompt: "⏸ Release aborted: {{ reason }}" }
  bumper:
    merged: { role: "publisher", prompt: "Publish {{ repo }} v{{ version }} from {{ repoPath }}. Release PR #{{ prNumber }} merged." }
    failed: { role: "$END", prompt: "❌ Bump failed: {{ reason }}" }
  publisher:
    released: { role: "$END", prompt: "✅ Released {{ packages }}@{{ version }}. Tag: {{ tag }}. GitHub: {{ githubSync }}" }
    failed: { role: "$END", prompt: "❌ Release failed: {{ reason }}" }
    verify_failed: { role: "$END", prompt: "⚠️ Verification failed: {{ reason }}" }

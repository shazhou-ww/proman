name: "release"
description: "Release proman with $SUSPEND gates for PR review and npm OTP."
roles:
  preflight:
    description: "Verify repository readiness for release"
    goal: "Check all pre-flight conditions for releasing proman."
    capabilities:
      - git
    procedure: |
      cd into the repo path from the task prompt.

      Check base conditions — abort on first failure with `$status: not_ready`:

      1. On `main` branch (`git branch --show-current`)
      2. Clean working tree (`git status --porcelain` is empty)
      3. Up to date (`git pull --ff-only` succeeds)
      4. CI green on HEAD:
         ```bash
         GITEA_TOKEN=$(cfg get GITEA_TOKEN)
         HEAD_SHA=$(git rev-parse HEAD)
         ```
         Poll `GET /api/v1/repos/<owner/repo>/commits/${HEAD_SHA}/status` up to 10× (30s interval).
         Accept `success`. Fail on `failure`/`error`. Timeout after ~5min if still `pending`.

      Then check changeset and publish state:

      5. Look for pending changesets:
         ```bash
         find .changeset -name '*.md' ! -name 'README.md' -type f
         ```

      6. Read current version from package.json and check npm:
         ```bash
         LOCAL_VERSION=$(node -e "console.log(require('./package.json').version)")
         PACKAGE_NAME=$(node -e "console.log(require('./package.json').name)")
         NPM_VERSION=$(npm view ${PACKAGE_NAME}@${LOCAL_VERSION} version 2>/dev/null || echo "")
         ```

      Decision:
      - Changesets found → output `$status: ready` with changeset list (normal full flow)
      - No changesets, but local version NOT on npm → output `$status: already_bumped` with version (skip bumper, go straight to publish)
      - No changesets, and local version already on npm → output `$status: not_ready` with reason "no pending changesets and current version already published"

      Pass through `repo` and `repoPath` from the task prompt in all non-error outputs.
    output: "ready, already_bumped, or not_ready"
    frontmatter:
      oneOf:
        - properties:
            $status: { const: "ready" }
            changesets: { type: string }
            repo: { type: string }
            repoPath: { type: string }
          required: [$status, changesets, repo, repoPath]
        - properties:
            $status: { const: "already_bumped" }
            version: { type: string }
            repo: { type: string }
            repoPath: { type: string }
          required: [$status, version, repo, repoPath]
        - properties:
            $status: { const: "not_ready" }
            reason: { type: string }
          required: [$status, reason]

  bumper:
    description: "Bump version, generate changelog, open PR, and suspend for review"
    goal: "Create a version bump PR and suspend until it is reviewed and merged."
    capabilities:
      - git
      - npm
    procedure: |
      cd into the repo path.

      **First run — create the bump PR:**

      1. Read changeset files to determine bump type (take highest: minor > patch):
         ```bash
         find .changeset -name '*.md' ! -name 'README.md' -exec cat {} +
         ```

      2. Calculate new version from current `package.json`:
         ```bash
         CURRENT=$(node -e "console.log(require('./package.json').version)")
         ```
         Split MAJOR.MINOR.PATCH, apply bump type.

      3. Create release branch and apply changes:
         ```bash
         git checkout -b release/v${NEW_VERSION}
         npm version ${NEW_VERSION} --no-git-tag-version
         ```

      4. Generate CHANGELOG entry — prepend `## v${NEW_VERSION} (YYYY-MM-DD)` with changeset bodies.
         Initialize CHANGELOG.md if missing.

      5. Delete consumed changeset files:
         ```bash
         find .changeset -name '*.md' ! -name 'README.md' -delete
         ```

      6. Build and test to verify the bump is clean:
         ```bash
         pnpm build && pnpm test
         ```
         If either fails, abort: `git checkout main`, output `$status: failed`.

      7. Commit and push:
         ```bash
         git add -A
         git commit -m "release: v${NEW_VERSION}"
         git push -u origin release/v${NEW_VERSION}
         ```

      8. Open PR via Gitea API:
         ```bash
         GITEA_TOKEN=$(cfg get GITEA_TOKEN)
         curl -s -X POST \
           -H "Authorization: token ${GITEA_TOKEN}" \
           -H "Content-Type: application/json" \
           "https://git.shazhou.work/api/v1/repos/${OWNER_REPO}/pulls" \
           -d '{"title":"release: v'"${NEW_VERSION}"'","head":"release/v'"${NEW_VERSION}"'","base":"main","body":"..."}'
         ```

      9. Emit `$SUSPEND` with reason including the PR number and URL.

      **On resume — verify PR is merged:**

      1. Find the release PR: look for open or merged PRs with head branch `release/v*` via Gitea API.
      2. If PR is not merged, emit `$SUSPEND` again with "PR still open — waiting for merge".
      3. If merged:
         ```bash
         git checkout main && git pull --ff-only
         ```
      4. Read the version from package.json to confirm.
      5. Output `$status: merged` with version, PR number, and pass through `repo` and `repoPath`.

    output: "merged after PR is reviewed, or $SUSPEND while waiting"
    frontmatter:
      oneOf:
        - properties:
            $status: { const: "merged" }
            version: { type: string }
            prNumber: { type: string }
            repo: { type: string }
            repoPath: { type: string }
          required: [$status, version, repo, repoPath]
        - properties:
            $status: { const: "failed" }
            reason: { type: string }
          required: [$status, reason]

  publisher:
    description: "Build, test, publish to npm with OTP, tag, verify, sync"
    goal: "Publish the bumped version to npm and finalize the release."
    capabilities:
      - git
      - npm
    procedure: |
      cd into the repo path. Should be on main with the bumped version already merged.

      **First run — build, test, and request OTP:**

      1. Verify on main, clean tree, correct version in package.json.
      2. Build and test:
         ```bash
         pnpm build && pnpm test
         ```
         If either fails, output `$status: failed`.
      3. Emit `$SUSPEND` with reason:
         "Ready to publish @shazhou/proman@{version}. Please resume with the npm OTP code:
          uwf thread resume <thread-id> -p 'OTP: <6-digit-code>'"

      **On resume — publish with OTP:**

      1. Extract the 6-digit OTP code from the supplementary prompt text.
         If no valid OTP found, emit `$SUSPEND` again asking for OTP.

      2. Publish to npm:
         ```bash
         npm publish --access public --otp ${OTP}
         ```
         If publish fails with OTP/auth error, emit `$SUSPEND` with "OTP invalid or expired, please provide a new one".
         If publish fails with other error, output `$status: failed`.

      3. Tag and push:
         ```bash
         git tag "v${VERSION}"
         git push origin --tags
         ```

      4. Verify:
         ```bash
         npm view @shazhou/proman@${VERSION} version
         ```
         Check tag on Gitea via API. If verification fails, output `$status: verify_failed`.

      5. Sync to GitHub (if remote exists):
         ```bash
         git remote -v | grep github
         git push github main --tags
         ```
         Note result but do NOT fail the release if GitHub sync fails.

      6. Output `$status: released` with package, version, tag, githubSync.

    output: "released, failed, or verify_failed"
    frontmatter:
      oneOf:
        - properties:
            $status: { const: "released" }
            package: { type: string }
            version: { type: string }
            tag: { type: string }
            githubSync: { type: string }
          required: [$status, package, version, tag]
        - properties:
            $status: { const: "failed" }
            reason: { type: string }
          required: [$status, reason]
        - properties:
            $status: { const: "verify_failed" }
            reason: { type: string }
          required: [$status, reason]

graph:
  $START:
    new: { role: "preflight", prompt: "Pre-flight check for releasing {{{repo}}} from {{{repoPath}}}." }
    resume: { role: "preflight", prompt: "Re-check release readiness for {{{repo}}} at {{{repoPath}}}." }
  preflight:
    ready: { role: "bumper", prompt: "Bump version for {{{repo}}} at {{{repoPath}}}. Pending changesets:\n{{{changesets}}}" }
    already_bumped: { role: "publisher", prompt: "Publish {{{repo}}} v{{{version}}} from {{{repoPath}}}. Version already bumped, skipping to publish." }
    not_ready: { role: "$END", prompt: "⏸ Release aborted: {{{reason}}}" }
  bumper:
    merged: { role: "publisher", prompt: "Publish {{{repo}}} v{{{version}}} from {{{repoPath}}}. Release PR #{{{prNumber}}} merged." }
    failed: { role: "$END", prompt: "❌ Bump failed: {{{reason}}}" }
  publisher:
    released: { role: "$END", prompt: "✅ Released {{{package}}}@{{{version}}}. Tag: {{{tag}}}. GitHub: {{{githubSync}}}" }
    failed: { role: "$END", prompt: "❌ Release failed: {{{reason}}}" }
    verify_failed: { role: "$END", prompt: "⚠️ Verification failed: {{{reason}}}" }

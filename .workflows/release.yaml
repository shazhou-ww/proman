name: "release"
description: "Release workflow for proman (single-package project). Consumes changesets, bumps version, builds, tests, publishes to npm, tags, and syncs to GitHub."
roles:
  releaser:
    description: "Executes the full release pipeline for a single-package project"
    goal: "You are a release engineer for a single-package TypeScript project. You execute a safe, verified release."
    capabilities:
      - git
      - npm
    procedure: |
      You will receive a repo slug (owner/repo) and local repo path in the task prompt.
      cd into the local repo path for all operations.

      **Step 1 — Pre-flight checks (ALL must pass, abort on first failure):**

      1a. On `main` branch:
      ```bash
      BRANCH=$(git branch --show-current)
      ```
      If not `main`, output `$status: not_ready` with reason.

      1b. Clean working tree:
      ```bash
      git status --porcelain
      ```
      If output is non-empty, output `$status: not_ready` with reason.

      1c. Pull latest and check for divergence:
      ```bash
      git pull --ff-only
      ```
      If this fails (diverged), output `$status: not_ready` with reason.

      1d. Pending changesets exist:
      ```bash
      find .changeset -name '*.md' ! -name 'README.md' -type f
      ```
      If no `.md` files found (excluding README.md), output `$status: not_ready` with reason "no pending changesets".

      1e. CI is green on latest commit:
      ```bash
      GITEA_TOKEN=$(cfg get GITEA_TOKEN)
      HEAD_SHA=$(git rev-parse HEAD)
      OWNER_REPO="<owner/repo>"  # substitute from task prompt

      for i in $(seq 1 10); do
        CI_STATE=$(curl -s "https://git.shazhou.work/api/v1/repos/${OWNER_REPO}/commits/${HEAD_SHA}/status" \
          -H "Authorization: token ${GITEA_TOKEN}" | jq -r '.state')

        if [ "${CI_STATE}" = "success" ]; then
          break
        elif [ "${CI_STATE}" = "null" ] || [ "${CI_STATE}" = "" ]; then
          echo "No CI status found for commit ${HEAD_SHA} — no CI configured or commit too new"
          # output $status: not_ready with reason "no CI status for commit"
          break
        elif [ "${CI_STATE}" = "failure" ] || [ "${CI_STATE}" = "error" ]; then
          echo "CI failed with state: ${CI_STATE}"
          # output $status: not_ready with reason "CI ${CI_STATE}"
          break
        fi

        # CI is pending — wait and retry
        echo "CI pending (attempt ${i}/10), waiting 30s..."
        sleep 30
      done

      if [ "${CI_STATE}" != "success" ]; then
        echo "CI not green after about 5 minutes. Final state: ${CI_STATE}"
        # output $status: not_ready with reason "CI timeout — final state: ${CI_STATE}"
      fi
      ```

      **Step 2 — Determine version bump:**

      Read the changeset file(s) to determine bump type:
      ```bash
      find .changeset -name '*.md' ! -name 'README.md' -exec cat {} +
      ```
      The YAML frontmatter specifies `"<package>": patch|minor|major`.
      Take the highest bump level: major > minor > patch.
      If multiple changesets exist, the highest bump wins.
      Example: one changeset says `patch`, another says `minor` → result is `minor`.

      **Step 3 — Bump version:**

      Read current version from package.json:
      ```bash
      CURRENT_VERSION=$(node -e "console.log(require('./package.json').version)")
      ```

      Calculate new version based on bump type:
      ```bash
      IFS='.' read -r MAJOR MINOR PATCH <<< "${CURRENT_VERSION}"
      case "${BUMP_TYPE}" in
        major) NEW_VERSION="$((MAJOR + 1)).0.0" ;;
        minor) NEW_VERSION="${MAJOR}.$((MINOR + 1)).0" ;;
        patch) NEW_VERSION="${MAJOR}.${MINOR}.$((PATCH + 1))" ;;
      esac
      ```

      Update package.json version:
      ```bash
      npm version "${NEW_VERSION}" --no-git-tag-version
      if [ $? -ne 0 ]; then
        echo "npm version failed"
        # output $status: failed with reason
        exit 1
      fi
      ```

      **Step 4 — Generate CHANGELOG entry:**

      Prepend a new section to CHANGELOG.md with the version number, date, and entries from changeset files grouped by type:
      ```bash
      # Initialize CHANGELOG.md if missing
      [[ ! -f CHANGELOG.md ]] && echo "# Changelog" > CHANGELOG.md

      # Build the new entry
      ENTRY="## v${NEW_VERSION} ($(date +%Y-%m-%d))\n"
      for f in $(find .changeset -name '*.md' ! -name 'README.md' -type f); do
        # Extract body content after the closing --- of YAML frontmatter
        BODY=$(sed -n '/^---$/,/^---$/d; p' "$f" | sed '/^$/d')
        if [ -n "${BODY}" ]; then
          ENTRY="${ENTRY}\n${BODY}"
        fi
      done

      # Prepend to CHANGELOG.md
      { echo -e "${ENTRY}\n"; cat CHANGELOG.md; } > CHANGELOG.md.tmp && mv CHANGELOG.md.tmp CHANGELOG.md
      ```

      **Step 5 — Build and test:**
      ```bash
      pnpm build || { git checkout -- package.json pnpm-lock.yaml CHANGELOG.md; echo "build failed"; exit 1; }
      pnpm test || { git checkout -- package.json pnpm-lock.yaml CHANGELOG.md; echo "test failed"; exit 1; }
      pnpm lint || { git checkout -- package.json pnpm-lock.yaml CHANGELOG.md; echo "lint failed"; exit 1; }
      ```
      If any fails, output `$status: failed` with reason.

      **Step 6 — Publish to npm:**
      ```bash
      npm publish --access public
      ```
      If publish fails, revert version changes and output `$status: failed`:
      ```bash
      git checkout -- package.json pnpm-lock.yaml CHANGELOG.md
      ```

      **Step 7 — Clean up changesets and commit:**

      Delete consumed changeset files now that publish succeeded:
      ```bash
      find .changeset -name '*.md' ! -name 'README.md' -delete
      ```

      Commit, tag, and push:
      ```bash
      PACKAGE_NAME=$(node -e "console.log(require('./package.json').name)")
      NEW_VERSION=$(node -e "console.log(require('./package.json').version)")

      git add package.json pnpm-lock.yaml CHANGELOG.md .changeset/
      git commit -m "release: v${NEW_VERSION}"
      git tag "v${NEW_VERSION}"
      git push origin main --tags || {
        echo "Push failed. Package already published to npm as ${PACKAGE_NAME}@${NEW_VERSION}."
        echo "Manual recovery needed: push main + tag, or revert npm publish."
        # output $status: verify_failed with published: "true"
      }
      ```
      If push fails, output `$status: verify_failed` with reason and `published: "true"` (package is already on npm).

      **Step 8 — Verify:**

      8a. Check npm registry:
      ```bash
      npm view ${PACKAGE_NAME}@${NEW_VERSION} version
      ```

      8b. Check git tag exists on remote:
      ```bash
      GITEA_TOKEN=$(cfg get GITEA_TOKEN)
      curl -s "https://git.shazhou.work/api/v1/repos/${OWNER_REPO}/tags" \
        -H "Authorization: token ${GITEA_TOKEN}" | jq -r '.[].name' | grep -Fx "v${NEW_VERSION}"
      ```
      If the new tag is not found, output `$status: verify_failed`.

      **Step 9 — Sync to GitHub (optional):**

      Check if a GitHub remote exists:
      ```bash
      git remote -v | grep github
      ```
      If found, push main + tags to it. If push to GitHub fails, note the failure but do NOT mark the release as failed — the npm publish and Gitea push already succeeded.

      **Step 10 — Output:**
      Output `$status: released` with the package name, new version, tags, and GitHub sync status.

    output: "Report the release result. Set $status to released, not_ready, failed, or verify_failed."
    frontmatter:
      oneOf:
        - properties:
            $status: { const: "released" }
            package: { type: string }
            version: { type: string }
            tag: { type: string }
            githubSync: { type: string }
          required: [$status, package, version, tag]
        - properties:
            $status: { const: "not_ready" }
            reason: { type: string }
          required: [$status, reason]
        - properties:
            $status: { const: "failed" }
            reason: { type: string }
          required: [$status, reason]
        - properties:
            $status: { const: "verify_failed" }
            reason: { type: string }
            package: { type: string }
            published: { type: string }
          required: [$status, reason]

graph:
  $START:
    new: { role: "releaser", prompt: "Release {{{repo}}} from {{{repoPath}}}." }
    resume: { role: "releaser", prompt: "Retry release for {{{repo}}} from {{{repoPath}}}." }
  releaser:
    released: { role: "$END", prompt: "✅ Release complete. Package: {{{package}}}@{{{version}}}. Tag: {{{tag}}}. GitHub: {{{githubSync}}}" }
    not_ready: { role: "$END", prompt: "⏸ Release aborted — pre-flight failed: {{{reason}}}" }
    failed: { role: "$END", prompt: "❌ Release failed: {{{reason}}}" }
    verify_failed: { role: "$END", prompt: "⚠️ Release may be partial — verification failed: {{{reason}}}" }

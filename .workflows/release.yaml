name: "release"
version: 1
description: "Release proman with $SUSPEND gates for PR review and npm OTP."
roles:
  preflight:
    description: "Verify repository readiness for release"
    goal: "Check all pre-flight conditions for releasing proman."
    capabilities:
      - git
    procedure: |
      cd into the repo path from the task prompt.

      Check base conditions â€” abort on first failure with `$status: not_ready`:

      1. On `main` branch (`git branch --show-current`)
      2. Clean working tree (`git status --porcelain` is empty)
      3. Up to date (`git pull --ff-only` succeeds)
      4. CI green on HEAD:
         ```bash
         GITEA_TOKEN=$(cfg get GITEA_TOKEN)
         HEAD_SHA=$(git rev-parse HEAD)
         ```
         Poll `GET /api/v1/repos/<owner/repo>/commits/${HEAD_SHA}/statuses` (plural, with 's')
         up to 10Ă— (30s interval).

         Group results by `context` field. For each context, keep only the entry with the
         latest `created_at` timestamp. Evaluate only these latest-per-context entries:

         - All `success` â†’ accept, proceed.
         - Any `pending`, none newer â†’ keep polling.
         - At least one context's latest is `success`, no `pending` â†’ accept
           (a newer successful run supersedes an older failure under a different context).
         - All latest entries are `failure`/`error` â†’ run local verification fallback:
           ```bash
           pnpm build && pnpm test
           ```
           If local tests pass â†’ accept with warning ("CI status stale/flaky, local verification passed").
           If local tests also fail â†’ abort with `$status: not_ready`.

         Timeout after ~5min if still `pending`.

      Then check changeset and publish state:

      5. Look for pending changesets:
         ```bash
         find .changeset -name '*.md' ! -name 'README.md' -type f
         ```

      6. Read current version from package.json and check npm:
         ```bash
         LOCAL_VERSION=$(node -e "console.log(require('./package.json').version)")
         PACKAGE_NAME=$(node -e "console.log(require('./package.json').name)")
         NPM_VERSION=$(npm view ${PACKAGE_NAME}@${LOCAL_VERSION} version 2>/dev/null || echo "")
         ```

      Decision:
      - Changesets found â†’ output `$status: ready` with changeset list (normal full flow)
      - No changesets, but local version NOT on npm â†’ output `$status: already_bumped` with version (skip bumper, go straight to publish)
      - No changesets, and local version already on npm â†’ output `$status: not_ready` with reason "no pending changesets and current version already published"

      Pass through `repo` and `repoPath` from the task prompt in all non-error outputs.
    output: "ready, already_bumped, or not_ready"
    frontmatter:
      oneOf:
        - properties:
            $status: { const: "ready" }
            changesets: { type: string }
            repo: { type: string }
            repoPath: { type: string }
          required: [$status, changesets, repo, repoPath]
        - properties:
            $status: { const: "already_bumped" }
            version: { type: string }
            repo: { type: string }
            repoPath: { type: string }
          required: [$status, version, repo, repoPath]
        - properties:
            $status: { const: "not_ready" }
            reason: { type: string }
          required: [$status, reason]

  bumper:
    description: "Bump version, suspend for user confirmation, then open and merge PR"
    goal: "Bump version, let user confirm, then create and merge the release PR."
    capabilities:
      - git
      - npm
    procedure: |
      cd into the repo path.

      **First run â€” bump and suspend for confirmation:**

      1. Read changeset files to determine bump type (take highest: minor > patch):
         ```bash
         find .changeset -name '*.md' ! -name 'README.md' -exec cat {} +
         ```

      2. Calculate new version from current `package.json`:
         ```bash
         CURRENT=$(node -e "console.log(require('./package.json').version)")
         ```
         Split MAJOR.MINOR.PATCH, apply bump type.

      3. Create release branch and apply changes:
         ```bash
         git checkout -b release/v${NEW_VERSION}
         npm version ${NEW_VERSION} --no-git-tag-version
         ```

      4. Generate CHANGELOG entry â€” prepend `## v${NEW_VERSION} (YYYY-MM-DD)` with changeset bodies.
         Initialize CHANGELOG.md if missing.

      5. Delete consumed changeset files:
         ```bash
         find .changeset -name '*.md' ! -name 'README.md' -delete
         ```

      6. Build and test to verify the bump is clean:
         ```bash
         pnpm build && pnpm test
         ```
         If either fails, abort: `git checkout main`, output `$status: failed`.

      7. Emit `$SUSPEND` with the new version and changelog for user confirmation.

      **On resume â€” commit, open PR, merge directly:**

      1. Commit and push:
         ```bash
         git add -A
         git commit -m "release: v${NEW_VERSION}"
         git push --no-verify -u origin release/v${NEW_VERSION}
         ```

      2. Open PR via Gitea API:
         ```bash
         GITEA_TOKEN=$(cfg get GITEA_TOKEN)
         curl -s -X POST \
           -H "Authorization: token ${GITEA_TOKEN}" \
           -H "Content-Type: application/json" \
           "https://git.shazhou.work/api/v1/repos/${OWNER_REPO}/pulls" \
           -d '{"title":"release: v'"${NEW_VERSION}"'","head":"release/v'"${NEW_VERSION}"'","base":"main","body":"..."}'
         ```
         Record the PR number.

      3. Merge the PR directly via Gitea API (no review required):
         ```bash
         curl -s -X POST \
           -H "Authorization: token ${GITEA_TOKEN}" \
           -H "Content-Type: application/json" \
           "https://git.shazhou.work/api/v1/repos/${OWNER_REPO}/pulls/<PR_NUMBER>/merge" \
           -d '{"Do":"merge","merge_message_field":"release: v'"${NEW_VERSION}"'"}'
         ```
         If merge fails, output `$status: failed` with reason.

      4. Update local main:
         ```bash
         git checkout main && git pull --ff-only
         ```

      5. Read the version from package.json to confirm.
      6. Output `$status: merged` with version, PR number, and pass through `repo` and `repoPath`.

    output: "merged after user confirms version, or $SUSPEND while waiting"
    frontmatter:
      oneOf:
        - properties:
            $status: { const: "merged" }
            version: { type: string }
            prNumber: { type: string }
            repo: { type: string }
            repoPath: { type: string }
          required: [$status, version, repo, repoPath]
        - properties:
            $status: { const: "failed" }
            reason: { type: string }
          required: [$status, reason]

  publisher:
    description: "Build, test, publish to npm, tag, verify, sync"
    goal: "Publish the bumped version to npm and finalize the release."
    capabilities:
      - git
      - npm
    procedure: |
      cd into the repo path. Should be on main with the bumped version already merged.

      1. Verify on main, clean tree, correct version in package.json.

      2. Build and test:
         ```bash
         pnpm build && pnpm test
         ```
         If either fails, output `$status: failed`.

      3. Publish to npm (automation token, no OTP needed):
         ```bash
         pnpm publish --no-git-checks
         ```
         If publish fails, output `$status: failed`.

      4. Tag and push:
         ```bash
         git tag "v${VERSION}"
         git push origin --tags
         ```

      5. Verify:
         ```bash
         npm view @shazhou/proman@${VERSION} version
         ```
         Check tag on Gitea via API. If verification fails, output `$status: verify_failed`.

      6. Sync to GitHub (if remote exists):
         ```bash
         git remote -v | grep github
         git push github main --tags
         ```
         Note result but do NOT fail the release if GitHub sync fails.

      7. Output `$status: released` with package, version, tag, githubSync.

    output: "released, failed, or verify_failed"
    frontmatter:
      oneOf:
        - properties:
            $status: { const: "released" }
            package: { type: string }
            version: { type: string }
            tag: { type: string }
            githubSync: { type: string }
          required: [$status, package, version, tag]
        - properties:
            $status: { const: "failed" }
            reason: { type: string }
          required: [$status, reason]
        - properties:
            $status: { const: "verify_failed" }
            reason: { type: string }
          required: [$status, reason]

graph:
  $START:
    new: { role: "preflight", prompt: "Pre-flight check for releasing {{ repo }} from {{ repoPath }}." }
    resume: { role: "preflight", prompt: "Re-check release readiness for {{ repo }} at {{ repoPath }}." }
  preflight:
    ready: { role: "bumper", prompt: "Bump version for {{ repo }} at {{ repoPath }}. Pending changesets:\n{{ changesets }}" }
    already_bumped: { role: "publisher", prompt: "Publish {{ repo }} v{{ version }} from {{ repoPath }}. Version already bumped, skipping to publish." }
    not_ready: { role: "$END", prompt: "âŹ¸ Release aborted: {{ reason }}" }
  bumper:
    merged: { role: "publisher", prompt: "Publish {{ repo }} v{{ version }} from {{ repoPath }}. Release PR #{{ prNumber }} merged." }
    failed: { role: "$END", prompt: "âťŚ Bump failed: {{ reason }}" }
  publisher:
    released: { role: "$END", prompt: "âś… Released {{ package }}@{{ version }}. Tag: {{ tag }}. GitHub: {{ githubSync }}" }
    failed: { role: "$END", prompt: "âťŚ Release failed: {{ reason }}" }
    verify_failed: { role: "$END", prompt: "âš ď¸Ź Verification failed: {{ reason }}" }
